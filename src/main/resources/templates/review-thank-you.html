<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thank You for Your Review</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0;">
<div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 30px; text-align: center; border-radius: 10px;">
        <h1 style="margin: 0;">Thank You!</h1>
    </div>

    <div style="background: #f9fafb; padding: 30px; border-radius: 10px; margin-top: 20px; text-align: center;">
        <p style="font-size: 18px;">Dear <strong th:text="${clientName}">John</strong>,</p>

        <p>Thank you for taking the time to share your experience with <strong th:text="${itemName}">iPhone 15 Pro</strong>.</p>

        <div style="font-size: 32px; color: #fbbf24; margin: 20px 0;">
            <span th:each="i : ${#numbers.sequence(1, rating)}">★</span>
            <span th:each="i : ${#numbers.sequence(1, 5 - rating)}">☆</span>
        </div>

        <p>Your feedback helps us improve our service and assist other customers.</p>

        <div style="margin-top: 30px;">
            <a th:href="${dashboardUrl}"
               style="display: inline-block; background: #10b981; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">
                View Your Orders
            </a>
        </div>
    </div>
</div>
</body>
</html>
