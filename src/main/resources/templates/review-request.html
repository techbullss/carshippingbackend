<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Share Your Experience</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0;">
<div style="max-width: 550px; margin: 0 auto; padding: 20px;">
    <!-- Simple header - NO GRADIENT -->
    <div style="background-color: #059669; padding: 20px; text-align: center;">
        <h1 style="margin: 0; color: white; font-size: 22px;">How was your experience?</h1>
    </div>

    <!-- Simple content area -->
    <div style="padding: 20px;">
        <p>Dear <strong th:text="${clientName}">Customer</strong>,</p>

        <p>Thank you for your recent order of <strong th:text="${itemName}">Item</strong>.</p>

        <!-- Simple order details - NO BORDERS -->
        <p><strong>Order ID:</strong> <span th:text="${requestId}">REQ-0042</span></p>
        <p><strong>Item:</strong> <span th:text="${itemName}">Item Name</span></p>
        <p><strong>Date:</strong> <span th:text="${orderDate}">2024-01-15</span></p>

        <!-- SIMPLE review link - just text, no button styling -->
        <p style="margin-top: 25px;">We'd love your feedback:</p>
        <p><a th:href="${reviewUrl}" style="color: #059669;">Share your experience →</a></p>

        <!-- Simple footer - minimal links -->
        <hr style="margin: 25px 0; border: none; border-top: 1px solid #ddd;">
        <p style="font-size: 12px; color: #666;">
            f-carshipping.com |
            <a href="mailto:support@f-carshipping.com" style="color: #666;">support@f-carshipping.com</a>
        </p>
        <p style="font-size: 11px; color: #999;">If you didn't request this, please ignore.</p>
    </div>
</div>
</body>
</html>
