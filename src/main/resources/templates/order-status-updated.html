<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Status Updated</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0;">
<div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; padding: 30px; text-align: center; border-radius: 10px 10px 0 0;">
        <h1 style="margin: 0;">Order Status Updated</h1>
    </div>

    <div style="background: #f9fafb; padding: 30px; border-radius: 0 0 10px 10px;">
        <p style="font-size: 16px;">Dear <strong th:text="${clientName}">John Doe</strong>,</p>

        <p>The status of your order has been updated.</p>

        <div style="background: white; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #3b82f6;">
            <h3 style="margin-top: 0; color: #2563eb;">Order Details</h3>
            <p><strong>Request ID:</strong> <span th:text="${requestId}">REQ-0042</span></p>
            <p><strong>Item:</strong> <span th:text="${itemName}">iPhone 15 Pro</span></p>
            <p><strong>New Status:</strong> <span style="color: #10b981; font-weight: bold;" th:text="${newStatus}">DELIVERED</span></p>
            <p><strong>Updated:</strong> <span th:text="${updatedDate}">2024-01-15</span></p>
        </div>

        <!-- Review Link -->
        <div style="text-align: center; margin: 30px 0; background: #f3f4f6; padding: 20px; border-radius: 8px;">
            <p style="margin-bottom: 15px;"><strong>We'd love to hear your feedback!</strong></p>
            <a th:href="${reviewLink}"
               style="display: inline-block; background: #10b981; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">
                ⭐ Leave a Review
            </a>
        </div>

        <a th:href="${orderUrl}" style="color: #10b981; text-decoration: none;">View Order Details →</a>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e5e7eb; text-align: center; color: #6b7280; font-size: 14px;">
            <p>Thank you for choosing f-carshipping.com!</p>
        </div>
    </div>
</div>
</body>
</html>
