<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmed</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0;">
<div style="max-width: 550px; margin: 0 auto; padding: 20px;">
    <!-- Simple header - NO GRADIENT -->
    <div style="background-color: #059669; padding: 20px; text-align: center;">
        <h1 style="margin: 0; color: white; font-size: 22px;">Order Confirmed!</h1>
    </div>

    <!-- Simple content - NO BACKGROUND COLOR -->
    <div style="padding: 20px;">
        <p>Dear <strong th:text="${clientName}">Customer</strong>,</p>

        <p>Your order has been confirmed and is being processed.</p>

        <!-- Simple order details - NO BORDERS, NO BACKGROUND -->
        <p><strong>Order ID:</strong> <span th:text="${requestId}">REQ-0042</span></p>
        <p><strong>Item:</strong> <span th:text="${itemName}">Item Name</span></p>
        <p><strong>Date:</strong> <span th:text="${orderDate}">2024-01-15</span></p>

        <!-- SIMPLE review mention - ONE LINK only -->
        <p style="margin-top: 25px;">We'd love your feedback when you receive your item:</p>
        <p><a th:href="${reviewLink}" style="color: #059669;">Share your experience →</a></p>

        <!-- Simple footer -->
        <hr style="margin: 25px 0; border: none; border-top: 1px solid #ddd;">
        <p style="font-size: 12px; color: #666;">
            We'll notify you when your order status changes.<br>
            <a href="https://f-carshipping.com" style="color: #666;">f-carshipping.com</a>
        </p>
    </div>
</div>
</body>
</html>
