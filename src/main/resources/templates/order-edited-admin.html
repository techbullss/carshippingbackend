<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Updated by Admin</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0;">
<div style="max-width: 550px; margin: 0 auto; padding: 20px;">
    <div style="background-color: #3b82f6; padding: 20px; text-align: center;">
        <h1 style="margin: 0; color: white; font-size: 22px;">Order Updated by Admin</h1>
    </div>

    <div style="padding: 20px;">
        <p>Dear <strong th:text="${clientName}">Customer</strong>,</p>

        <p>Your order has been updated by our team.</p>

        <p><strong>Order #:</strong> <span th:text="${requestId}">REQ-0042</span></p>
        <p><strong>Item:</strong> <span th:text="${itemName}">Item Name</span></p>
        <p><strong>New Status:</strong> <span th:text="${newStatus}">Processing</span></p>
        <p><strong>Updated:</strong> <span th:text="${updatedDate}">2024-01-15</span></p>

        <p><a th:href="${orderUrl}" style="color: #3b82f6;">View Your Order →</a></p>

        <p>If you have any questions, please contact us at <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}">support@f-carshipping.com</a></p>

        <hr style="margin: 25px 0; border: none; border-top: 1px solid #ddd;">
        <p style="font-size: 12px; color: #666;">
            <a th:href="${appDomain}" style="color: #666;">f-carshipping.com</a>
        </p>
    </div>
</div>
</body>
</html>
