<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Cancelled</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9fafb;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
        }
        .header {
            background-color: #dc2626;
            padding: 30px;
            text-align: center;
            border-radius: 10px 10px 0 0;
        }
        .header h1 {
            margin: 0;
            color: white;
            font-size: 28px;
        }
        .content {
            padding: 30px;
            border: 1px solid #e5e7eb;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }
        .order-details {
            background-color: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .review-link {
            margin: 30px 0;
            padding: 20px;
            text-align: center;
            background-color: #f0fdf4;
            border-radius: 8px;
        }
        .review-link a {
            display: inline-block;
            background-color: #059669;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
        }
        .button {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Order Cancelled</h1>
    </div>

    <div class="content">
        <p>Dear <strong th:text="${clientName}">Customer</strong>,</p>

        <p>Your order has been cancelled as requested.</p>

        <div class="order-details">
            <p><strong>Order #:</strong> <span th:text="${requestId}"></span></p>
            <p><strong>Item:</strong> <span th:text="${itemName}"></span></p>
            <p><strong>Cancellation Date:</strong> <span th:text="${cancellationDate}"></span></p>
            <p><strong>Reason:</strong> <span th:text="${cancellationReason}"></span></p>
        </div>

        <div class="review-link">
            <p><strong>📝 Still want to share feedback?</strong></p>
            <a th:href="${reviewLink}">Share Your Feedback →</a>
        </div>

        <div style="text-align:center;">
            <a th:href="${orderUrl}" class="button">View Order History</a>
        </div>

        <div class="footer">
            <p>
                Contact us:
                <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}"></a>
            </p>
            <p>
                <a th:href="${appDomain}">f-carshipping.com</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
